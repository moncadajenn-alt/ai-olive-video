name: Render Video

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Chrome
        run: npx remotion browser ensure

      - name: Render Reels (Instagram)
        run: npx remotion render AIVideo out/reels.mp4 --codec h264 --crf 18 --pixel-format yuv420p

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: ai-olive-video
          path: out/reels.mp4
          retention-days: 7
